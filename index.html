<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Test</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #e6e6e0;
                color: #000;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;

                display: flex;
                justify-content: center;
                min-height: 100vh;
                padding: 15px;
            }

            .main {
                text-align: center;
                max-width: 680px;
                width: 100%;
                display: flex;
                flex-direction: column;
                font-size: 1.1rem;
            }

            .top-header {
                text-align: center;
                font-size: 2.1rem;
                font-weight: 500;
                letter-spacing: 0.08rem;
            }

            .big-header {
                margin-top: -18px;
                text-align: center;
                font-size: 5rem;
                font-weight: 900;
                letter-spacing: 0.04em;
                color: #4682b4;
                text-shadow:
                    -1px -1px 1px rgba(255, 255, 255, 0.75),
                    -2px -2px 2px rgba(255, 255, 255, 0.5),
                    -3px -3px 3px rgba(255, 255, 255, 0.25),
                    1px 1px 1px rgba(0, 0, 0, 0.75),
                    2px 2px 2px rgba(0, 0, 0, 0.5),
                    3px 3px 3px rgba(0, 0, 0, 0.25);
            }
            </style>
    </head>
    <body>
        <main class="main">
            <div class="top-header">testing page</div>
            <div class="big-header">Test</div>
        </main>
</html>
